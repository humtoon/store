<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humtoon — Toonify your favourite people</title>
  <meta name="description" content="Custom toonified acrylic standees and fridge magnets made from your photos. Solo, couples, family, squad, babies and pets." />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="Humtoon" />
  <meta property="og:description" content="Send a photo, get a toonified acrylic standee or fridge magnet." />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --ink: #1f2330;
      --muted: #6b7280;
      --accent: #8b7cf6;
      --bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header, main, footer { width: 100%; max-width: 960px; margin: 0 auto; padding: 0 24px; }
    header { padding-top: 32px; }
    .logo { height: 56px; width: auto; display: block; }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 16px;
      padding: 64px 24px;
    }
    .hero h1 { font-size: clamp(2rem, 6vw, 3.5rem); letter-spacing: -0.02em; }
    .hero p { color: var(--muted); font-size: clamp(1rem, 2.5vw, 1.25rem); max-width: 38ch; }
    .accent { color: var(--accent); }

    .badge {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: rgba(139, 124, 246, 0.12);
      padding: 6px 12px;
      border-radius: 999px;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 24px;
    }
  </style>
</head>
<body>
  <header>
    <img class="logo" src="images/logo.png" alt="Humtoon logo" />
  </header>

  <main class="hero">
    <span class="badge">Coming soon</span>
    <h1>Toonify your <span class="accent">favourite people</span>.</h1>
    <p>Send us a photo &mdash; solo, couple, baby, pet or the whole squad &mdash; and we turn it into a custom acrylic standee or fridge magnet.</p>
  </main>

  <footer>
    &copy; <span id="year"></span> Humtoon. Built with care.
  </footer>

  <!--
    Skeleton page. The full catalog will be rendered from products.json.
    See README.md for the data model and next steps.
  -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
