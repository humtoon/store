<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Humtoon — Turn your favourite memories into everyday art</title>
<meta name="description" content="Highly detailed 2D custom toons from your photos — printed on premium acrylic standees & fridge magnets. Pan-India shipping." />
<meta name="theme-color" content="#7a5af0" />
<meta property="og:title" content="Humtoon — your face belongs on a shelf" />
<meta property="og:description" content="Send a photo, get a hand-drawn toon on a premium acrylic standee & fridge magnet. Pan-India shipping." />
<meta property="og:type" content="website" />
<meta property="og:image" content="images/solo-graduation-humtoon.jpeg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Newsreader:ital,wght@1,400;1,500&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================ TOKENS ============================ */
:root{
  --page:#e7e3f0;
  --app:#fcfbfe;
  --white:#ffffff;
  --tint:#f6f3fb;
  --ink:#1c1a24;
  --muted:#6c6878;
  --faint:#9b97a8;
  --line:#efecf5;
  --lav:#7a5af0;
  --lav-dark:#6741e6;
  --lav-chip:#f1ecff;
  --yellow:#ffce3a;
  --yellow-soft:#fff4cf;
  --green:#3fb27f;
  --star:#ffb400;
  --shadow:0 8px 22px -16px rgba(40,20,80,.45);
  --shadow-lg:0 18px 44px -22px rgba(40,20,80,.55);
  --r-card:20px; --r-media:24px; --r-btn:14px; --r-pill:999px;
  --max:440px;
  --ease:cubic-bezier(.22,.68,.26,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Nunito Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--ink);
  background:var(--page);
  line-height:1.5;
  font-weight:400;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  scroll-behavior:smooth;
  overscroll-behavior-y:none;
}
:focus-visible{outline:2.5px solid var(--lav);outline-offset:2px;border-radius:6px}
:focus:not(:focus-visible){outline:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}
.q{font-family:"Quicksand",sans-serif}
.ed{font-family:"Newsreader",serif;font-style:italic}
.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}

/* ============================ APP SHELL ============================ */
#shell{
  max-width:var(--max);
  margin:0 auto;
  min-height:100vh;
  background:var(--app);
  box-shadow:0 0 60px -10px rgba(40,20,80,.28);
  position:relative;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
header.bar{
  position:sticky;top:0;z-index:40;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  background:rgba(252,251,254,.82);
  backdrop-filter:saturate(180%) blur(12px);
  -webkit-backdrop-filter:saturate(180%) blur(12px);
  border-bottom:1px solid var(--line);
}
.bar-btn{
  width:40px;height:40px;border-radius:var(--r-pill);
  display:grid;place-items:center;font-size:20px;color:var(--ink);
  transition:background .18s, transform .12s;
}
.bar-btn:active{transform:scale(.9)}
.bar-btn.wa{background:var(--lav);color:#fff;font-size:18px;box-shadow:var(--shadow)}
.bar-btn.wa:hover{background:var(--lav-dark)}
.wordmark{font-size:23px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer}
.wordmark .oo{color:var(--lav)}

main{flex:1;display:block}
.screen{animation:fade .4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ============================ DRAWER ============================ */
#backdrop{
  position:fixed;inset:0;z-index:50;background:rgba(28,26,36,.5);
  backdrop-filter:blur(2px);opacity:0;visibility:hidden;transition:opacity .28s;
}
#backdrop.open{opacity:1;visibility:visible}
#drawer{
  position:fixed;top:0;bottom:0;left:0;z-index:51;width:80%;max-width:320px;
  background:var(--app);transform:translateX(-105%);transition:transform .3s cubic-bezier(.3,.9,.3,1);
  display:flex;flex-direction:column;padding:22px;box-shadow:var(--shadow-lg);
}
#drawer.open{transform:none}
#drawer .dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#drawer nav{display:flex;flex-direction:column;margin-top:18px}
#drawer nav a{padding:15px 6px;font-size:19px;font-weight:600;border-bottom:1px solid var(--line);transition:color .15s,padding-left .15s}
#drawer nav a:hover{color:var(--lav);padding-left:12px}
.drawer-foot{margin-top:auto;display:flex;gap:10px}
.drawer-foot a{flex:1;text-align:center;padding:13px;border-radius:var(--r-btn);font-weight:700;font-size:14px}
.df-ig{background:var(--ink);color:#fff}
.df-wa{background:var(--lav);color:#fff}

/* ============================ BUTTONS ============================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:"Quicksand";font-weight:700;font-size:16px;
  padding:14px 20px;border-radius:var(--r-btn);transition:transform .12s,background .18s,box-shadow .18s;
}
.btn:active{transform:scale(.96)}
.btn-pri{position:relative;overflow:hidden;background:linear-gradient(135deg,#8264ff,#6741e6);color:#fff;box-shadow:0 12px 26px -12px rgba(122,90,240,.85),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-pri:hover{background:linear-gradient(135deg,#7351f5,#5b37db)}
.btn-pri::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-18deg);transition:left .6s var(--ease)}
.btn-pri:hover::after{left:140%}
.btn-out{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
.btn-out:hover{border-color:var(--lav);color:var(--lav)}
.btn-white{background:#fff;color:var(--lav)}
.btn-block{width:100%}

/* ============================ HERO ============================ */
.hero{background:linear-gradient(180deg,#f6f3fb,#fcfbfe);padding:26px 22px 30px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-120px;right:-90px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(122,90,240,.22),transparent 70%);filter:blur(8px);pointer-events:none;z-index:0}
.hero::after{content:"";position:absolute;bottom:-60px;left:-80px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,206,58,.18),transparent 70%);pointer-events:none;z-index:0}
.hero>*{position:relative;z-index:1}
.eyebrow{
  display:inline-flex;align-items:center;gap:7px;background:#fff;color:var(--lav);
  font-weight:800;font-size:12.5px;padding:7px 13px;border-radius:var(--r-pill);
  box-shadow:var(--shadow);border:1px solid var(--line);
}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(63,178,127,.18);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(63,178,127,.18)}50%{box-shadow:0 0 0 6px rgba(63,178,127,.05)}}
.hero h1{font-family:"Quicksand";font-weight:700;font-size:34px;line-height:1.12;letter-spacing:-.5px;margin:16px 0 10px;text-wrap:balance}
.hero h1 .lav{color:var(--lav)}
.hero .sub{font-family:"Newsreader";font-style:italic;font-size:17px;color:var(--muted);margin-bottom:18px}
.hero-btns{display:flex;gap:10px;margin-top:18px}
.hero-btns .btn{flex:1}
.scarcity{
  display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;
  font-size:12.5px;font-weight:700;color:var(--lav-dark);background:var(--lav-chip);
  padding:9px;border-radius:var(--r-pill);
}

/* ============================ BEFORE/AFTER SLIDER ============================ */
.ba-wrap{margin-top:4px}
/* hero: slider pins while the page scrolls, vertical scroll sweeps the reveal.
   JS translates the (absolutely-positioned) stage to fake sticky — real sticky
   would bind to the overflow:hidden .hero/#shell instead of the viewport. */
.ba-pin{position:relative}
.ba-pin-stage{position:absolute;top:0;left:0;right:0;will-change:transform;backface-visibility:hidden}
.ba{
  position:relative;width:100%;aspect-ratio:4/5;border-radius:var(--r-media);overflow:hidden;
  box-shadow:var(--shadow-lg);touch-action:none;user-select:none;-webkit-user-select:none;cursor:ew-resize;
  background:var(--tint);
}
/* scroll-driven slider: let the page scroll through it, no grab cursor */
.ba.ba-scroll{touch-action:pan-y;cursor:default}
.ba.ba-scroll .ba-knob{cursor:default}
.ba img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none}
.ba .ba-top{z-index:2}
.ba .ba-divider{position:absolute;top:0;bottom:0;width:3px;background:#fff;left:50%;transform:translateX(-50%);z-index:3;box-shadow:0 0 12px rgba(0,0,0,.25)}
.ba .ba-knob{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;
  width:40px;height:40px;border-radius:50%;background:#fff;display:grid;place-items:center;
  font-size:16px;color:var(--lav);box-shadow:0 4px 14px rgba(0,0,0,.28),0 0 0 5px rgba(255,255,255,.35);
  cursor:grab;
}
.ba:active .ba-knob{cursor:grabbing;transform:translate(-50%,-50%) scale(1.08)}
.ba.hinting .ba-top,.ba.hinting .ba-divider,.ba.hinting .ba-knob{transition:clip-path .55s var(--ease),left .55s var(--ease)}
.ba .lbl{position:absolute;top:12px;z-index:5;font-family:"Quicksand";font-weight:700;font-size:11px;letter-spacing:.5px;padding:5px 11px;border-radius:var(--r-pill)}
.ba .lbl-b{left:12px;background:var(--ink);color:#fff}
.ba .lbl-a{right:12px;background:var(--lav);color:#fff}
.ba-cap{text-align:center;color:var(--faint);font-size:13px;margin-top:10px}

/* ============================ SECTIONS ============================ */
section{padding:26px 22px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
.sec-head h2{font-family:"Quicksand";font-weight:700;font-size:22px;letter-spacing:-.3px}
.sec-head a{color:var(--lav);font-weight:700;font-size:14px}
.eyebrow-sm{font-family:"Quicksand";font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--lav)}

/* MARQUEE */
.marquee{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;padding:13px 0}
.marquee-track{display:flex;gap:0;width:max-content;animation:scroll 22s linear infinite}
.marquee-track span{padding:0 22px;font-weight:700;font-size:14px;white-space:nowrap;color:var(--ink)}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* PRODUCT SCROLLER + CARDS */
.scroller{display:flex;gap:14px;overflow-x:auto;scroll-snap-type:x mandatory;padding:4px 22px 8px;margin:0 -22px}
.scroller .card{scroll-snap-align:start;flex:0 0 162px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;cursor:pointer;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.card .ph{position:relative;aspect-ratio:1/1;overflow:hidden;background:var(--tint)}
.card .ph img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .ph img{transform:scale(1.05)}
.people-pill{position:absolute;left:8px;top:8px;background:rgba(28,26,36,.72);color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:var(--r-pill);backdrop-filter:blur(4px)}
.hot-pill{position:absolute;right:8px;top:8px;background:var(--yellow);color:var(--ink);font-size:10.5px;font-weight:800;padding:4px 9px;border-radius:var(--r-pill)}
.card .body{padding:11px 12px 13px}
.card .nm{font-family:"Quicksand";font-weight:700;font-size:15px;line-height:1.2}
.card .tg{font-family:"Newsreader";font-style:italic;font-size:13px;color:var(--muted);margin:3px 0 9px;min-height:18px}
.card .row{display:flex;align-items:center;justify-content:space-between}
.card .price{font-family:"Quicksand";font-weight:700;font-size:15px}
.plus{width:30px;height:30px;border-radius:50%;background:var(--lav);color:#fff;display:grid;place-items:center;font-size:18px;font-weight:700;transition:transform .12s}
.card:hover .plus{transform:rotate(90deg)}

/* HOW IT WORKS */
.dark-panel{background:var(--ink);color:#fff;border-radius:var(--r-card);padding:24px 22px}
.dark-panel .eyebrow-sm{color:var(--yellow)}
.dark-panel h2{color:#fff}
.step{display:flex;gap:14px;align-items:flex-start;margin-top:18px}
.step .num{flex:0 0 34px;height:34px;border-radius:50%;background:var(--lav);color:#fff;display:grid;place-items:center;font-family:"Quicksand";font-weight:700;font-size:16px}
.step h3{font-family:"Quicksand";font-weight:700;font-size:16px;margin-bottom:2px}
.step p{font-size:14px;color:#c8c4d4}

/* 2-IN-1 */
.pill-yellow{display:inline-flex;align-items:center;gap:6px;background:var(--yellow-soft);color:#7a5a00;font-weight:800;font-size:12.5px;padding:7px 13px;border-radius:var(--r-pill)}
.duo-imgs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.duo-imgs figure{border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow);position:relative;background:var(--tint)}
.duo-imgs img{aspect-ratio:4/5;object-fit:cover;width:100%}
.duo-imgs figcaption{position:absolute;left:8px;bottom:8px;background:#fff;font-weight:700;font-size:12px;padding:5px 10px;border-radius:var(--r-pill);box-shadow:var(--shadow)}

/* REVEAL ROW */
.reveal-card{scroll-snap-align:start;flex:0 0 230px;background:#fff;border:1px solid var(--line);border-radius:var(--r-card);padding:12px;box-shadow:var(--shadow)}
.reveal-imgs{display:flex;align-items:center;gap:8px}
.reveal-imgs .b{flex:0 0 64px;height:80px;border-radius:12px;object-fit:cover;filter:saturate(.9)}
.reveal-imgs .arrow{color:var(--lav);font-size:20px;font-weight:700}
.reveal-imgs .a{flex:1;height:118px;border-radius:14px;object-fit:cover}
.reveal-card .rl{margin-top:9px;font-family:"Quicksand";font-weight:700;font-size:13.5px;text-align:center}

/* REVIEWS */
.reviews-sec{background:var(--tint)}
.review-card{scroll-snap-align:start;flex:0 0 270px;background:#fff;border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--shadow)}
.review-card img{aspect-ratio:16/11;object-fit:cover;width:100%}
.review-card .rb{padding:14px}
.stars{color:var(--star);font-size:14px;letter-spacing:1px}
.review-card .qt{font-size:14px;margin:8px 0 12px;color:var(--ink)}
.review-card .who{font-family:"Quicksand";font-weight:700;font-size:14px}
.review-card .role{font-size:12.5px;color:var(--faint)}

/* CTA BAND */
.cta-band{background:linear-gradient(135deg,#7a5af0,#9b7bff);color:#fff;border-radius:var(--r-card);padding:28px 22px;text-align:center;box-shadow:var(--shadow-lg)}
.cta-band h2{font-family:"Quicksand";font-weight:700;font-size:25px;line-height:1.15;letter-spacing:-.3px}
.cta-band p{font-size:15px;margin:8px 0 18px;color:#efe9ff}

/* ============================ SHOP ============================ */
.screen-pad{padding:24px 22px 40px}
.screen-pad h1{font-family:"Quicksand";font-weight:700;font-size:26px;letter-spacing:-.3px}
.screen-pad .sh-sub{font-family:"Newsreader";font-style:italic;font-size:16px;color:var(--muted);margin-top:4px}
.chips{display:flex;gap:9px;overflow-x:auto;margin:18px -22px 18px;padding:2px 22px 6px}
.chip{flex:0 0 auto;background:#fff;border:1.5px solid #e8e3f4;color:var(--ink);font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:var(--r-pill);transition:.15s;font-family:"Quicksand"}
.chip.active{background:var(--lav);color:#fff;border-color:var(--lav)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid2 .card{flex:none}

/* ============================ PRODUCT ============================ */
.prod{padding:18px 22px 130px}
.gallery-main{position:relative;border-radius:var(--r-media);overflow:hidden;aspect-ratio:4/5;box-shadow:var(--shadow-lg);background:var(--tint)}
.gallery-main img{width:100%;height:100%;object-fit:cover}
.gallery-main .badge-pill{position:absolute;left:12px;top:12px;background:var(--yellow);color:var(--ink);font-family:"Quicksand";font-weight:800;font-size:12px;padding:6px 12px;border-radius:var(--r-pill);box-shadow:var(--shadow)}
.thumbs{display:flex;gap:9px;margin-top:11px;overflow-x:auto;padding-bottom:4px}
.thumb{flex:0 0 62px;height:62px;border-radius:13px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--tint)}
.thumb.active{border-color:var(--lav)}
.thumb img{width:100%;height:100%;object-fit:cover}
.title-block{display:flex;justify-content:space-between;align-items:flex-start;margin-top:18px;gap:12px}
.title-block .nm{font-family:"Quicksand";font-weight:700;font-size:23px;line-height:1.1}
.title-block .tg{font-family:"Newsreader";font-style:italic;font-size:15px;color:var(--lav);margin-top:3px}
.title-block .pr{font-family:"Quicksand";font-weight:700;font-size:21px;text-align:right;white-space:nowrap}
.rating-row{display:flex;align-items:center;gap:7px;margin-top:8px;font-size:13px;color:var(--muted)}
.blurb{font-size:15px;color:var(--muted);margin-top:14px;line-height:1.6}
.field-label{font-family:"Quicksand";font-weight:700;font-size:15px;margin:22px 0 10px;display:flex;align-items:center;gap:8px}
.stepper{display:flex;align-items:center;gap:16px}
.stepper button{width:42px;height:42px;border-radius:12px;background:var(--lav-chip);color:var(--lav-dark);font-size:22px;font-weight:700;display:grid;place-items:center}
.stepper .cnt{font-family:"Quicksand";font-weight:700;font-size:22px;min-width:34px;text-align:center}
.helper{font-size:13px;color:var(--muted);margin-top:9px}
.trust-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:24px}
.trust-mini{background:var(--tint);border:1px solid var(--line);border-radius:14px;padding:13px 8px;text-align:center}
.trust-mini .ic{font-size:20px}
.trust-mini .tx{font-family:"Quicksand";font-weight:700;font-size:11.5px;margin-top:5px;line-height:1.25}

/* STICKY BUY BAR */
.buybar{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:30;
  width:100%;max-width:var(--max);
  background:rgba(252,251,254,.9);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--line);padding:11px 14px calc(11px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:11px;box-shadow:0 -10px 30px -18px rgba(40,20,80,.5);
}
.buybar .pinfo{flex:0 0 auto;line-height:1.15}
.buybar .pinfo .p{font-family:"Quicksand";font-weight:700;font-size:18px}
.buybar .pinfo .f{font-size:11.5px;color:var(--muted)}
.buybar .btn{flex:1;padding:14px 12px;font-size:15px}
.buybar .ig{flex:0 0 48px;width:48px;height:48px;border-radius:13px;background:var(--ink);color:#fff;display:grid;place-items:center;font-size:20px}

/* ============================ GUIDE & FAQ ============================ */
.shots{background:var(--lav-chip);border-radius:var(--r-card);padding:18px;margin-top:18px}
.shots h3{font-family:"Quicksand";font-weight:700;font-size:16px;margin-bottom:6px}
.shots .lead{font-size:14px;color:var(--lav-dark);margin-bottom:12px}
.shots ol{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:11px}
.shots li{position:relative;padding-left:36px;font-size:14px;color:var(--ink);line-height:1.5}
.shots li::before{counter-increment:s;content:counter(s);position:absolute;left:0;top:-1px;width:25px;height:25px;border-radius:50%;background:var(--lav);color:#fff;font-family:"Quicksand";font-weight:700;font-size:13px;display:grid;place-items:center}
.shots li b{font-weight:800}
.shots .angles{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.shots .angles span{background:#fff;border:1px solid var(--line);color:var(--lav-dark);font-family:"Quicksand";font-weight:700;font-size:11.5px;padding:4px 10px;border-radius:var(--r-pill)}
.tip-card{display:flex;gap:14px;background:#fff;border:1px solid var(--line);border-radius:var(--r-card);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.tip-card .ic{font-size:26px;flex:0 0 auto}
.tip-card h3{font-family:"Quicksand";font-weight:700;font-size:16px}
.tip-card p{font-size:13.5px;color:var(--muted);margin-top:3px}
.good-imgs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}

// products.json is the single source of truth for prices. We fetch it at runtime
// and override the baked-in defaults (which keep the site correct over file://).
function fmtPrice(raw, id){
  const m = String(raw).match(/\d[\d,]*/);
  if(!m) return raw;
  const n = Number(m[0].replace(/,/g,""));
  const rupee = "₹" + n.toLocaleString("en-IN");
  return id==="family_squad" ? "From " + rupee : rupee;
}
async function loadPrices(){
  try{
    const res = await fetch("products.json", {cache:"no-store"});
    if(!res.ok) return;
    const data = await res.json();
    let changed = false;
    (data.products||[]).forEach(pj=>{
      const p = PRODUCTS.find(x=>x.id===pj.id);
      if(!p || !pj.price) return;
      const num = parseInt(String(pj.price).replace(/[^\d]/g,""), 10);
      if(!isNaN(num)) p.priceNum = num;
      const formatted = fmtPrice(pj.price, pj.id);
      if(formatted !== p.price){ p.price = formatted; changed = true; }
    });
    if(changed) render(); // only re-render if a price actually differs (avoids flash)
  }catch(e){ /* offline / file:// — keep baked-in prices */ }
}

  </div>`;
}
function initSliders(root){
  $$("[data-slider]", root).forEach(ba=>{
    const top = $(".ba-top", ba), div = $(".ba-divider", ba), knob = $(".ba-knob", ba);
    let pos = 50;
    const set = p => {
      pos=Math.max(0,Math.min(100,p));
      top.style.clipPath=`inset(0 ${100-pos}% 0 0)`; div.style.left=pos+"%"; knob.style.left=pos+"%";
      ba.setAttribute("aria-valuenow", Math.round(pos));
    };
    ba.__set = set;                       // let the scroll driver position the divider
    // keyboard accessibility (works for both modes)
    ba.addEventListener("keydown", e=>{
      if(e.key==="ArrowLeft"){ set(pos-5); e.preventDefault(); }
      else if(e.key==="ArrowRight"){ set(pos+5); e.preventDefault(); }
    });

    if(ba.dataset.scroll){                // hero: reveal is driven by vertical scroll, not dragging
      set(0);                             // start on the original photo
      return;
    }

    // standard drag-to-compare slider
    let dragging=false;
    const fromE = e => { const r=ba.getBoundingClientRect(); set((e.clientX-r.left)/r.width*100); };
    ba.addEventListener("pointerdown", e=>{dragging=true; ba.setPointerCapture(e.pointerId); fromE(e);});
    ba.addEventListener("pointermove", e=>{ if(dragging) fromE(e); });
    ba.addEventListener("pointerup", ()=>dragging=false);
    ba.addEventListener("pointercancel", ()=>dragging=false);
    set(50);
  });
}

// fade + rise sections into view as the user scrolls
let _io;
function initReveal(root){
  if(reducedMotion()) return;
  if(!_io) _io = new IntersectionObserver((entries)=>{
    entries.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add("in"); _io.unobserve(en.target); } });
  }, {threshold:.12, rootMargin:"0px 0px -8% 0px"});
  $$(".screen > section, .screen .dark-panel", root).forEach((el,i)=>{
    el.classList.add("reveal");
    el.style.transitionDelay = Math.min(i,4)*40 + "ms";
    _io.observe(el);
  });
}

    return;
  }

  let sweep = 0, pinTop = 0, stick = 64, raf = 0;
  function measure(){
    stage.style.transform = "none";                 // measure natural height un-translated
    const stageH = stage.offsetHeight;
    // hold the slider centred in the viewport (but never under the header) while it's frozen
    stick = Math.max(64, Math.round((window.innerHeight - stageH) / 2));
    // length of vertical scroll the freeze consumes before the page moves on again
    sweep = Math.round(window.innerHeight * 0.8);
    pin.style.height = (stageH + sweep) + "px";
    pinTop = pin.getBoundingClientRect().top + window.scrollY;
    update();
  }
  function update(){
    if(sweep <= 0){ return; }
    // translate the stage to keep it parked at viewport `stick` while frozen, so the page
    // appears to stop and the same scroll gesture drives the reveal 0→100 (and back on the way up)
    let y = window.scrollY + stick - pinTop;
    y = y < 0 ? 0 : y > sweep ? sweep : y;
    stage.style.transform = `translate3d(0,${y}px,0)`;
    ba.__set(y / sweep * 100);
  }
  const onScroll = ()=>{ if(raf) return; raf = requestAnimationFrame(()=>{ raf = 0; update(); }); };
  const onResize = ()=> measure();
  window.addEventListener("scroll", onScroll, {passive:true});
  window.addEventListener("resize", onResize);
  _baCleanup = ()=>{ window.removeEventListener("scroll", onScroll); window.removeEventListener("resize", onResize); cancelAnimationFrame(raf); };
  $$("img", ba).forEach(im=>{ if(!im.complete) im.addEventListener("load", measure, {once:true}); });
  measure();
  setTimeout(measure, 700); // re-measure once the hero's reveal animation settles
}

/* ============================ RENDER ============================ */
function render(){
  const app = $("#app");
  const foot = $("#footer");
  if(!foot.innerHTML) foot.innerHTML = footerHTML(); // populate once; content is static
  let html = "";
  if(state.screen==="home") html = homeHTML();
  else if(state.screen==="shop") html = shopHTML();
  else if(state.screen==="product") html = productHTML(PRODUCTS.find(p=>p.id===state.productId));
  else if(state.screen==="guide") html = guideHTML();
  else if(state.screen==="faq") html = faqHTML();
  app.innerHTML = html;

  // header left button: hamburger on home, back chevron elsewhere
  const nb = $("#navBtn");
  nb.textContent = state.screen==="home" ? "☰" : "‹";
  nb.style.fontSize = state.screen==="home" ? "20px" : "30px";
  nb.setAttribute("aria-label", state.screen==="home" ? "Open menu" : "Go back to home");

  initSliders(app);
  initReveal(app);
  initBaScroll(app);
  if(state.screen==="product") wireProduct();
  $("#footer").style.display = state.screen==="product" ? "none" : "block"; // sticky bar owns product bottom
  window.scrollTo({top:0,behavior:"instant"});
}

function go(screen, productId){
  state.screen = screen;
  if(productId) state.productId = productId;
  closeDrawer();
  closeSheet();
  render();
}

/* ============================ PRODUCT WIRING ============================ */
function wireProduct(){
  const p = PRODUCTS.find(x=>x.id===state.productId);
  const ps = getPS(p.id);
  const updateBuy = ()=>{
    $("#orderBtn").href = waLink(orderMsg(p, ps.people));
  };
  updateBuy();

  // thumbnails
  $$(".thumb").forEach(t=>t.addEventListener("click",()=>{
    ps.img = +t.dataset.thumb;
    $("#prodMain").src = IMG(p.gallery[ps.img]);
    $$(".thumb").forEach(x=>x.classList.toggle("active", x===t));
  }));

  // stepper
  $$("[data-step]").forEach(b=>b.addEventListener("click",()=>{
    ps.people = Math.max(4, Math.min(15, ps.people + (+b.dataset.step)));
    $("#ppl").textContent = ps.people;
    $("#pplHelp").textContent = `Base covers 4 · +₹100 each extra (+₹${(ps.people-4)*100})`;
    const dp = displayPrice(p, ps);
    $("#buyPrice").textContent = dp;
    const tp = $("#titlePrice"); if(tp) tp.textContent = dp;
    updateBuy();
  }));
}

/* ============================ GLOBAL EVENTS ============================ */
function openDrawer(){ $("#drawer").classList.add("open"); $("#backdrop").classList.add("open"); $("#drawer").setAttribute("aria-hidden","false"); }
function closeDrawer(){ $("#drawer").classList.remove("open"); $("#backdrop").classList.remove("open"); $("#drawer").setAttribute("aria-hidden","true"); }

function openSheet(key){
  const pol = POLICIES[key]; if(!pol) return;
  $("#sheetBody").innerHTML = `
    <div class="sheet-head"><span class="ic">${pol.icon}</span><h3 class="q" id="sheetTitle">${esc(pol.title)}</h3></div>
    <div class="sheet-body">${pol.body}</div>
    <button class="btn btn-pri btn-block" data-nav="shop" style="margin-top:6px">Create your Humtoon →</button>`;
  $("#sheet").classList.add("open"); $("#sheetBack").classList.add("open"); $("#sheet").setAttribute("aria-hidden","false");
}
function closeSheet(){ $("#sheet").classList.remove("open"); $("#sheetBack").classList.remove("open"); $("#sheet").setAttribute("aria-hidden","true"); }

document.addEventListener("click", e=>{
  const nav = e.target.closest("[data-nav]");
  if(nav){ go(nav.dataset.nav); return; }
  const prod = e.target.closest("[data-product]");
  if(prod){ go("product", prod.dataset.product); return; }
  const cat = e.target.closest("[data-cat]");
  if(cat){ state.cat = cat.dataset.cat; render(); return; }
  const pol = e.target.closest("[data-policy]");
  if(pol){ openSheet(pol.dataset.policy); return; }
  const faq = e.target.closest("[data-faq]");
  if(faq){
    const item = faq;
    const open = item.classList.contains("open");
    $$(".faq-item").forEach(x=>{ x.classList.remove("open"); $(".pm",x).textContent="+"; });
    if(!open){ item.classList.add("open"); $(".pm",item).textContent="–"; }
    return;
  }
});

$("#navBtn").addEventListener("click",()=>{ state.screen==="home" ? openDrawer() : go("home"); });
$("#drawerClose").addEventListener("click", closeDrawer);
$("#backdrop").addEventListener("click", closeDrawer);
$("#sheetBack").addEventListener("click", closeSheet);
document.addEventListener("keydown", e=>{ if(e.key==="Escape"){ closeDrawer(); closeSheet(); } });

// header + drawer whatsapp prefilled
const genericWa = waLink("Hi Humtoon! I'd love to create a custom toon. Here is my photo:");
$("#headerWa").href = genericWa;
$("#drawerWa").href = genericWa;

render();
loadPrices(); // pull live prices from products.json (source of truth)
</script>
